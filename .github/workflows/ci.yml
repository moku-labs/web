# .github/workflows/ci.yml
#
# Pre-release safety net: runs the full check suite on every push to main and on
# pull requests. Single Node 24 job (no matrix) — the router uses the global
# URLPattern, which is only a global in Node 24+ (and Bun/CF Workers/browsers).
# The release/publish workflows run these same checks again at release time.
# Actions are SHA-pinned for supply-chain hygiene.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bunx tsc --noEmit
      - run: bun run test
      - run: bun run build
      - run: bun run validate
