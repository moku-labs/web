# .github/workflows/create-release.yml
#
# Manually-triggered release cutter. Runs the reusable parallel check suite first;
# only if all checks pass does it bump the version, commit + tag it on main, and
# create a GitHub Release with auto-generated notes. It does NOT publish to npm —
# publishing is handled by publish.yml, which triggers on the release being
# published. Actions are SHA-pinned for supply-chain hygiene.

name: Create Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Semver bump for the next release"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
          - prerelease

permissions:
  contents: write # push the version-bump commit + tag and create the release

concurrency:
  group: create-release
  cancel-in-progress: false

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  create-release:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # full history so release notes can diff from the last tag
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Bump version
        id: bump
        run: |
          VERSION="$(npm version "${{ inputs.release_type }}" --no-git-tag-version)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, and push
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): ${VERSION}"
          git tag -a "${VERSION}" -m "${VERSION}"
          git push origin "HEAD:${GITHUB_REF_NAME}" --follow-tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          # Flag prerelease versions (semver with a `-` suffix) so the GitHub Release
          # and the npm `next` dist-tag stay consistent; stable versions become latest.
          PRERELEASE_FLAG=""
          case "${VERSION}" in
            *-*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          gh release create "${VERSION}" --title "${VERSION}" --generate-notes ${PRERELEASE_FLAG}
