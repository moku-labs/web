# .github/workflows/publish.yml
#
# Publishes @moku-labs/web to npm for releases that were NOT created by
# create-release.yml (which publishes inline). Triggers:
#   - release: published  → a GitHub Release created by hand in the UI
#   - workflow_dispatch    → manually (re)publish a specific tag, e.g. one whose
#                            inline publish failed, or the existing v0.2.0
# Runs the parallel checks, then the reusable npm publish job (OIDC trusted
# publishing). Actions are SHA-pinned for supply-chain hygiene.
#
# IMPORTANT: the npm trusted-publisher on npmjs.com must reference this workflow's
# filename (publish.yml) + this repository for the OIDC exchange to be accepted.

name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write # OIDC for npm trusted publishing

concurrency:
  group: publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  publish:
    needs: checks
    uses: ./.github/workflows/publish-npm.yml
    with:
      ref: ${{ github.event.release.tag_name || inputs.tag }}
