# .github/workflows/publish-npm.yml
#
# Reusable npm publish job — builds a given ref and publishes to npm via OIDC
# "trusted publishing" (no token; provenance attached automatically). Called by
# create-release.yml (inline, right after a release is created) and publish.yml
# (on a published GitHub Release or a manual re-publish). Defined once so the
# publish logic lives in a single place. Actions are SHA-pinned.
#
# IMPORTANT: the npm trusted-publisher on npmjs.com must reference the CALLER
# workflow filename (create-release.yml and/or publish.yml) + this repository.

name: Publish to npm (reusable)

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref/tag to build and publish (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write # OIDC token for npm trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref }}
      # Node 24 (URLPattern global) + registry-url wires up npm for OIDC publish.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
      - run: bun install --frozen-lockfile

      - name: Verify ref matches package.json version
        env:
          REF: ${{ inputs.ref }}
        run: |
          PKG="$(node -p "require('./package.json').version")"
          if [ "${REF#v}" != "${PKG}" ]; then
            echo "::error::ref ${REF} does not match package.json version ${PKG}"
            exit 1
          fi

      - run: bun run build

      - name: Upgrade npm to a trusted-publishing-capable version
        run: npm install -g npm@latest
      - name: Publish to npm
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          # Stable versions move the `latest` dist-tag automatically; prerelease
          # versions (semver with a `-` suffix) go to `next` so they never clobber it.
          case "$VERSION" in
            *-*) NPM_TAG="next" ;;
            *) NPM_TAG="latest" ;;
          esac
          echo "Publishing $VERSION to npm dist-tag '$NPM_TAG'"
          npm publish --access public --tag "$NPM_TAG"
