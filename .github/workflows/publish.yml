# .github/workflows/publish.yml
#
# Publishes @moku-labs/web to npm when a GitHub Release is published (created by
# create-release.yml or by hand). Uses npm OIDC "trusted publishing" — no token,
# provenance attached automatically.
#
# IMPORTANT: the npm trusted-publisher configured on npmjs.com for this package must
# reference THIS workflow's filename (publish.yml) and this repository, or the OIDC
# exchange will be rejected. Actions are SHA-pinned for supply-chain hygiene.

name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC token for npm trusted publishing

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
      - run: bun install --frozen-lockfile

      - name: Verify release tag matches package.json version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          PKG="$(node -p "require('./package.json').version")"
          if [ "${TAG#v}" != "${PKG}" ]; then
            echo "::error::release tag ${TAG} does not match package.json version ${PKG}"
            exit 1
          fi

      # Full checks before anything reaches npm.
      - run: bun run lint
      - run: bunx tsc --noEmit
      - run: bun run test
      - run: bun run build
      - run: bun run validate

      # Publish via npm OIDC trusted publishing (tokenless; provenance automatic).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm to a trusted-publishing-capable version
        run: npm install -g npm@latest
      - name: Publish to npm
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          # Stable versions move the `latest` dist-tag automatically; prerelease
          # versions (semver with a `-` suffix) go to `next` so they never clobber it.
          case "$VERSION" in
            *-*) NPM_TAG="next" ;;
            *) NPM_TAG="latest" ;;
          esac
          echo "Publishing $VERSION to npm dist-tag '$NPM_TAG'"
          npm publish --access public --tag "$NPM_TAG"
