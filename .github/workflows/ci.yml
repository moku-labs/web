# .github/workflows/ci.yml
#
# Pre-release safety net: runs the reusable parallel check suite (lint, types,
# tests, build+validate) on every push to main and on pull requests. The
# release/publish workflows run the same suite again at release time.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    uses: ./.github/workflows/checks.yml
