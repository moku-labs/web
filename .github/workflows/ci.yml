# .github/workflows/ci.yml
#
# The single source of truth for the check suite: lint, types, tests, and
# build+validate run as PARALLEL jobs. Triggered directly on push/PR, and reused
# by publish.yml via `workflow_call` so release-time checks are byte-for-byte the
# same as PR checks.
#
# Node 24 (the router uses the global URLPattern, only a global in Node 24+).
# Every action is pinned to a commit SHA (not a tag) for supply-chain safety, and
# none of the check jobs need write access or the git token, so credentials are
# not persisted into the workspace.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  # Scoped by the top-level workflow name so a reused run from publish.yml never
  # shares a group with a standalone CI run. Only redundant PR runs are cancelled;
  # push-to-main and release-time runs always complete.
  group: checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: bun run lint

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: bun run test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0 # need all tags — the validate step seeds the version from the latest tag
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: bun run build
      # package.json carries NO version field (the version source of truth is the latest git tag;
      # see publish.yml). publint packs the tarball via `bun pm pack`, which requires a version, so
      # seed the LATEST TAG's version for the validate step only (0.0.0 only if there are no tags) —
      # never committed, never published.
      - name: Validate (seed version from latest tag for publint pack)
        run: |
          V="$(git tag --list 'v*' --sort=-v:refname | head -n1)"; V="${V#v}"
          npm version "${V:-0.0.0}" --no-git-tag-version --allow-same-version >/dev/null
          bun run validate
