# .github/workflows/create-release.yml
#
# Manually-triggered release cutter. Runs the parallel check suite, then (only if
# green) bumps the version, tags it, creates a GitHub Release with categorized
# conventional-commit notes, and publishes to npm in the SAME run (inline, via the
# reusable publish-npm.yml — a workflow-created release cannot trigger a separate
# publish workflow on its own). Actions are SHA-pinned for supply-chain hygiene.

name: Create Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Semver bump for the next release"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
          - prerelease

permissions:
  contents: write # push the version-bump commit + tag and create the release
  id-token: write # OIDC for the inline npm publish job

concurrency:
  group: create-release
  cancel-in-progress: false

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  create-release:
    needs: checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # full history so the changelog can diff from the last tag
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Bump version
        id: bump
        run: |
          VERSION="$(npm version "${{ inputs.release_type }}" --no-git-tag-version)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, and push
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): ${VERSION}"
          git tag -a "${VERSION}" -m "${VERSION}"
          git push origin "HEAD:${GITHUB_REF_NAME}" --follow-tags

      - name: Create GitHub Release with categorized notes
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          PREV="$(git describe --tags --abbrev=0 "${VERSION}^" 2>/dev/null || true)"
          RANGE="${PREV:+${PREV}..}${VERSION}"

          # Emit a markdown section for one conventional-commit type group.
          section() {
            local title="$1" types="$2" body
            body="$(git log "$RANGE" --no-merges --pretty=format:'%s||%h' \
              | grep -vE '^chore\(release\)' \
              | grep -E "^(${types})(\([^)]+\))?!?: " || true)"
            [ -z "$body" ] && return 0
            printf '### %s\n\n' "$title"
            printf '%s\n' "$body" \
              | sed -E 's/^[a-z]+\(([^)]+)\)!?: /**\1**: /; s/^[a-z]+!?: //; s/\|\|([0-9a-f]+)$/ (\1)/; s/^/- /'
            printf '\n'
          }

          {
            section "🚀 Features" "feat"
            section "🐛 Bug Fixes" "fix"
            section "⚡ Performance" "perf"
            section "♻️ Refactoring" "refactor"
            section "📝 Documentation" "docs"
            section "🧪 Tests" "test"
            section "🔧 CI & Build" "ci|build|chore"
            if [ -n "$PREV" ]; then
              printf '**Full Changelog**: https://github.com/%s/compare/%s...%s\n' \
                "$GITHUB_REPOSITORY" "$PREV" "$VERSION"
            fi
          } > RELEASE_NOTES.md

          PRERELEASE_FLAG=""
          case "${VERSION}" in
            *-*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          gh release create "${VERSION}" --title "${VERSION}" --notes-file RELEASE_NOTES.md ${PRERELEASE_FLAG}

  publish:
    needs: create-release
    uses: ./.github/workflows/publish-npm.yml
    with:
      ref: ${{ needs.create-release.outputs.version }}
